name: Publish and deploy ASP.Net Core app to Azure Web App service

env:
  AZURE_WEBAPP_NAME: eurocentric
  WEB_APP_PROJECT_PATH: './src/Eurocentric.WebApp'
  WEB_APP_PACKAGE_PATH: './src/Eurocentric.WebApp/publish'
  DOTNET_VERSION: '9.x'
  SOLUTION_PATH: 'Eurocentric.sln'
  PUBLISH_DIR: './publish'

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup dependency caching for faster builds
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Run all tests in solution
        run: dotnet test --configuration Release -- --report-trx --verbosity minimal

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/**/*'
          retention-days: 5

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files:
            '**/TestResults/**/*.trx'

      - name: Publish web app
        run: dotnet publish ${{ env.WEB_APP_PROJECT_PATH }} --configuration Release --no-restore --no-build --property:PublishDir=${{ env.PUBLISH_DIR }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ env.WEB_APP_PACKAGE_PATH }}
          retention-days: 2

  deploy:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v5
        with:
          name: webapp
          path: ${{ env.WEB_APP_PACKAGE_PATH }}

      - name: Deploy to Azure Web App service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEB_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEB_APP_PUBLISH_PROFILE }}
          package: ${{ env.WEB_APP_PACKAGE_PATH }}

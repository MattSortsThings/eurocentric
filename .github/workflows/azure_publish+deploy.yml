name: Publish and deploy ASP.Net Core app to Azure Web App service

env:
  AZURE_WEBAPP_NAME: eurocentric
  AZURE_WEBAPP_PACKAGE_PATH: './src/Eurocentric.WebApp/publish'
  DOTNET_VERSION: '9.x'
  SOLUTION_PATH: 'Eurocentric.sln'
  API_PROJECT_PATH: './src/Eurocentric.WebApp'
  PUBLISH_DIR: './publish'

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup dependency caching for faster builds
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore with dotnet
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build with dotnet
        run: dotnet build ${{ env.SOLUTION_PATH }} -c Release --no-restore

      - name: Run tests with dotnet
        run: dotnet test --configuration Release -- --verbosity minimal --report-trx --results-directory $(Agent.TempDirectory)
